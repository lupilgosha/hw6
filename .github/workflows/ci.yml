name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build consumer image
        run: docker build -f Dockerfile.consumer -t warehouse-consumer .
      - name: Build producer image
        run: docker build -f Dockerfile.producer -t warehouse-producer .

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/test_consumer_unit.py -v

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      COMPOSE_PROJECT_NAME: warehouse
    steps:
      - uses: actions/checkout@v4
      - name: Clean up Docker environment
        run: |
          docker stop $(docker ps -aq) 2>/dev/null || true
          docker rm $(docker ps -aq) 2>/dev/null || true
          docker network prune -f || true
          echo "Remaining containers:"
          docker ps -a
      - name: Start services
        run: docker compose up -d
      - name: Wait for all services
        run: |
          echo "Waiting for Kafka (port 9092)..."
          for i in $(seq 1 40); do
            nc -z localhost 9092 2>/dev/null && echo "Kafka port ready" && break
            echo "  attempt $i/40..."
            sleep 5
          done
          echo "Waiting for Schema Registry..."
          for i in $(seq 1 40); do
            curl -sf http://localhost:8081/subjects 2>/dev/null && echo "Schema Registry ready" && break
            echo "  attempt $i/40..."
            sleep 5
          done
          echo "Waiting for Cassandra..."
          for i in $(seq 1 40); do
            nc -z localhost 9042 2>/dev/null && echo "Cassandra port ready" && break
            echo "  attempt $i/40..."
            sleep 5
          done
          echo "Waiting for consumer..."
          for i in $(seq 1 40); do
            curl -sf http://localhost:8000/health 2>/dev/null && echo "Consumer ready" && break
            echo "  attempt $i/40..."
            sleep 5
          done
      - name: Show container status
        if: always()
        run: docker compose ps && docker compose logs kafka --tail=20 && docker compose logs schema-registry --tail=20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run integration tests
        env:
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          SCHEMA_REGISTRY_URL: http://localhost:8081
          CASSANDRA_CONTACT_POINTS: localhost
          WAREHOUSE_TOPIC: warehouse-events
        run: pytest tests/test_integration.py -v
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=50
      - name: Tear down
        if: always()
        run: docker compose down -v

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: integration-tests
    env:
      COMPOSE_PROJECT_NAME: warehouse
    steps:
      - uses: actions/checkout@v4
      - name: Clean up Docker environment
        run: |
          docker stop $(docker ps -aq) 2>/dev/null || true
          docker rm $(docker ps -aq) 2>/dev/null || true
          docker network prune -f || true
          echo "Remaining containers:"
          docker ps -a
      - name: Start services
        run: docker compose up -d
      - name: Wait for all services
        run: |
          echo "Waiting for Kafka (port 9092)..."
          for i in $(seq 1 40); do
            nc -z localhost 9092 2>/dev/null && echo "Kafka port ready" && break
            echo "  attempt $i/40..."
            sleep 5
          done
          echo "Waiting for Schema Registry..."
          for i in $(seq 1 40); do
            curl -sf http://localhost:8081/subjects 2>/dev/null && echo "Schema Registry ready" && break
            echo "  attempt $i/40..."
            sleep 5
          done
          echo "Waiting for Cassandra..."
          for i in $(seq 1 40); do
            nc -z localhost 9042 2>/dev/null && echo "Cassandra port ready" && break
            echo "  attempt $i/40..."
            sleep 5
          done
          echo "Waiting for consumer..."
          for i in $(seq 1 40); do
            curl -sf http://localhost:8000/health 2>/dev/null && echo "Consumer ready" && break
            echo "  attempt $i/40..."
            sleep 5
          done
      - name: Show container status
        if: always()
        run: docker compose ps && docker compose logs kafka --tail=20 && docker compose logs schema-registry --tail=20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run E2E tests
        env:
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          SCHEMA_REGISTRY_URL: http://localhost:8081
          CASSANDRA_CONTACT_POINTS: localhost
          CONSUMER_API_URL: http://localhost:8000
          WAREHOUSE_TOPIC: warehouse-events
        run: pytest tests/test_e2e.py -v
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=50
      - name: Tear down
        if: always()
        run: docker compose down -v

  load-tests:
    name: Load tests
    runs-on: ubuntu-latest
    needs: e2e-tests
    env:
      COMPOSE_PROJECT_NAME: warehouse
    steps:
      - uses: actions/checkout@v4
      - name: Clean up Docker environment
        run: |
          docker stop $(docker ps -aq) 2>/dev/null || true
          docker rm $(docker ps -aq) 2>/dev/null || true
          docker network prune -f || true
          echo "Remaining containers:"
          docker ps -a
      - name: Start services
        run: docker compose up -d
      - name: Wait for all services
        run: |
          echo "Waiting for Kafka (port 9092)..."
          for i in $(seq 1 40); do
            nc -z localhost 9092 2>/dev/null && echo "Kafka port ready" && break
            echo "  attempt $i/40..."
            sleep 5
          done
          echo "Waiting for Schema Registry..."
          for i in $(seq 1 40); do
            curl -sf http://localhost:8081/subjects 2>/dev/null && echo "Schema Registry ready" && break
            echo "  attempt $i/40..."
            sleep 5
          done
          echo "Waiting for Cassandra..."
          for i in $(seq 1 40); do
            nc -z localhost 9042 2>/dev/null && echo "Cassandra port ready" && break
            echo "  attempt $i/40..."
            sleep 5
          done
          echo "Waiting for consumer..."
          for i in $(seq 1 40); do
            curl -sf http://localhost:8000/health 2>/dev/null && echo "Consumer ready" && break
            echo "  attempt $i/40..."
            sleep 5
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run load tests
        run: |
          locust -f tests/locustfile.py \
            --headless \
            --users 10 \
            --spawn-rate 2 \
            --run-time 30s \
            --host http://localhost:8000 \
            --exit-code-on-error 1 \
            --html load-test-report.html
      - name: Upload load test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: load-test-report.html
      - name: Health check after load
        run: curl -sf http://localhost:8000/health
      - name: Tear down
        if: always()
        run: docker compose down -v
