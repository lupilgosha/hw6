global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: warehouse-consumer
    static_configs:
      - targets: ["consumer:8000"]

  - job_name: warehouse-producer
    static_configs:
      - targets: ["wms-producer:8001"]

  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]
