groups:
  - name: warehouse-consumer
    rules:
      - alert: ConsumerHighErrorRate
        expr: |
          rate(kafka_request_errors_total[5m])
          / rate(kafka_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate in warehouse consumer"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      - alert: ConsumerLatencyP95
        expr: |
          histogram_quantile(0.95, rate(kafka_request_duration_seconds_bucket[5m])) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Consumer p95 latency is high"
          description: "p95 processing time is {{ $value }}s"

  - name: kafka
    rules:
      - alert: KafkaConsumerLagHigh
        expr: kafka_consumergroup_lag > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group lag is {{ $value }} messages"
